name: Daily Paper Push

on:
  schedule:
    # 北京时间每天 7:00 AM = UTC 23:00 (前一天)
    - cron: "0 23 * * *"
  # 允许手动触发（用于测试）
  workflow_dispatch:

permissions:
  contents: write  # 允许推送 sent_papers.json

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Run daily paper push
        env:
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
          TRANSLATE_API_KEY: ${{ secrets.TRANSLATE_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Commit sent_papers.json (track pushed papers)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_papers.json
          if git diff --cached --quiet; then
            echo "No changes to sent_papers.json"
          else
            git commit -m "[bot] update sent papers tracking"
            git push
          fi
